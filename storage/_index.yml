indexpage:
  title: Storage switches
  lead: Storage switches enable you to build ONTAP clusters with more than two nodes. These Ethernet storage switches provide the foundation for scalable cluster interconnect solutions in NetApp ONTAP environments.
  summary: Use the docs on this site to install, configure, and maintain your storage switches for ONTAP cluster deployments.
  keywords: storage switches, cisco nexus switches, cluster switches, ontap clusters
