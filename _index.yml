indexpage:
  title: Switch documentation for ONTAP storage systems
  lead: NetApp offers cluster, storage, and shared switches to provide connectivity between host storage and two or more NetApp controllers, allowing you to non-disruptively move data and network interfaces across your storage infrastructure.
  summary: Use the docs on this site to install, upgrade and maintain your cluster, shared storage and MetroCluster switches.
